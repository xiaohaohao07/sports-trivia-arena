<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>体育百科知识竞答 · Sports Trivia Arena</title>
<style>
:root{
  --bg:#0A1628;--card:#111D33;--border:rgba(255,255,255,.08);
  --green:#00E676;--gold:#FFD740;--blue:#448AFF;--red:#FF5252;--cyan:#18FFFF;
  --t1:#FFFFFF;--t2:rgba(255,255,255,.7);--t3:rgba(255,255,255,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Noto Sans SC",sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(ellipse at 20% 0%,rgba(0,230,118,.06),transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(68,138,255,.06),transparent 50%),var(--bg)}
.wrap{max-width:880px;margin:0 auto;padding:40px 20px 80px}
.screen{display:none;animation:fade .4s ease}.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}

/* ===== INTRO ===== */
.intro{text-align:center;padding:60px 20px 20px}
.logo{font-size:64px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(0,230,118,.4))}
.intro h1{font-size:42px;font-weight:800;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.02em}
.intro h1 small{display:block;font-size:14px;font-weight:400;letter-spacing:.4em;-webkit-text-fill-color:var(--t3);margin-top:8px;text-transform:uppercase}
.intro .desc{color:var(--t2);font-size:15px;line-height:1.9;max-width:600px;margin:24px auto}
.sports-icons{display:flex;justify-content:center;gap:12px;margin:28px 0;flex-wrap:wrap}
.sport-tag{padding:6px 16px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--t2);letter-spacing:.1em}
.id-box{max-width:400px;margin:32px auto}
.id-box label{display:block;font-size:12px;color:var(--t3);letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px}
.id-box input{width:100%;padding:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--t1);font-size:18px;font-family:inherit;outline:none;text-align:center;letter-spacing:.1em;transition:border .3s}
.id-box input:focus{border-color:var(--green)}
.id-box input::placeholder{color:var(--t3)}
.settings{display:flex;gap:12px;justify-content:center;margin:24px 0}
.sopt{padding:10px 20px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;color:var(--t2);transition:all .2s;font-family:inherit}
.sopt:hover,.sopt.sel{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08)}
.btn{display:inline-block;padding:16px 52px;background:linear-gradient(135deg,var(--green),#00C853);color:var(--bg);border:none;border-radius:50px;font-family:inherit;font-size:16px;font-weight:700;letter-spacing:.15em;cursor:pointer;transition:all .3s;box-shadow:0 8px 32px rgba(0,230,118,.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,230,118,.4)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* ===== QUIZ ===== */
.hud{position:sticky;top:0;background:rgba(10,22,40,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 0;margin:-40px -20px 28px;z-index:10}
.hud-inner{max-width:880px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:16px}
.hud .qno{font-size:13px;color:var(--green);font-weight:700;letter-spacing:.1em;min-width:60px}
.hud .track{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.hud .fill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .4s}
.hud .score-disp{font-size:13px;color:var(--gold);font-weight:700;min-width:80px;text-align:right}
.hud .timer{font-size:22px;font-weight:800;color:var(--t1);min-width:48px;text-align:center;font-variant-numeric:tabular-nums}
.hud .timer.warn{color:var(--red);animation:pulse .5s infinite}

.qcard{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 36px;box-shadow:0 12px 48px rgba(0,0,0,.3)}
.qcat{display:inline-block;padding:4px 14px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);border-radius:20px;font-size:11px;color:var(--green);letter-spacing:.15em;margin-bottom:16px}
.qtext{font-size:22px;font-weight:600;line-height:1.7;margin-bottom:28px;color:var(--t1)}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{padding:16px 22px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .25s;font-size:15px;color:var(--t2);font-family:inherit;text-align:left;display:flex;align-items:center;gap:14px}
.opt .key{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--t3);flex-shrink:0;transition:all .25s}
.opt:hover:not(.locked){background:rgba(68,138,255,.08);border-color:var(--blue);transform:translateX(4px)}
.opt:hover:not(.locked) .key{background:rgba(68,138,255,.2);color:var(--blue)}
.opt.correct{background:rgba(0,230,118,.12)!important;border-color:var(--green)!important;color:var(--green)!important}
.opt.correct .key{background:var(--green)!important;color:var(--bg)!important}
.opt.wrong{background:rgba(255,82,82,.1)!important;border-color:var(--red)!important;color:var(--red)!important}
.opt.wrong .key{background:var(--red)!important;color:#fff!important}
.opt.locked{cursor:default}
.explain{margin-top:20px;padding:16px 20px;background:rgba(255,215,64,.06);border-left:3px solid var(--gold);border-radius:6px;font-size:13px;color:var(--t2);line-height:1.8;display:none}
.explain.show{display:block;animation:fade .3s}

.qnav{display:flex;justify-content:flex-end;margin-top:24px}
.qnav button{padding:12px 36px;background:linear-gradient(135deg,var(--green),#00C853);color:var(--bg);border:none;border-radius:50px;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .2s;display:none}
.qnav button.show{display:block}
.qnav button:hover{transform:translateY(-2px)}

/* ===== RESULTS ===== */
.rh{text-align:center;padding:20px 0 32px}
.rh .badge{display:inline-block;padding:6px 20px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);border-radius:30px;font-size:11px;color:var(--green);letter-spacing:.4em;text-transform:uppercase;margin-bottom:20px}
.rh h2{font-size:40px;font-weight:800;background:linear-gradient(135deg,var(--green),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.rh .sub{font-size:14px;color:var(--t3);margin-top:8px;letter-spacing:.1em}

.sec{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sec-icon{font-size:20px}
.sec-title{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:.05em}
.sec-sub{margin-left:auto;font-size:11px;color:var(--t3);letter-spacing:.2em;text-transform:uppercase}

.big-score{text-align:center;padding:20px 0}
.big-score .num{font-size:72px;font-weight:900;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.big-score .of{font-size:18px;color:var(--t3);margin-top:4px}
.big-score .rank-text{font-size:16px;color:var(--gold);margin-top:12px;font-weight:600}

.cat-bars{display:flex;flex-direction:column;gap:14px}
.cat-bar{display:flex;align-items:center;gap:14px}
.cat-bar .label{min-width:70px;font-size:13px;color:var(--t2);text-align:right}
.cat-bar .track{flex:1;height:20px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;position:relative}
.cat-bar .fill{height:100%;border-radius:10px;transition:width 1s ease}
.cat-bar .val{min-width:50px;font-size:13px;color:var(--t3);font-variant-numeric:tabular-nums}
.cat-bar[data-sport="足球"] .fill{background:linear-gradient(90deg,#4CAF50,#81C784)}
.cat-bar[data-sport="篮球"] .fill{background:linear-gradient(90deg,#FF9800,#FFB74D)}
.cat-bar[data-sport="网球"] .fill{background:linear-gradient(90deg,#CDDC39,#E6EE9C)}
.cat-bar[data-sport="橄榄球"] .fill{background:linear-gradient(90deg,#795548,#A1887F)}
.cat-bar[data-sport="棒球"] .fill{background:linear-gradient(90deg,#F44336,#E57373)}
.cat-bar[data-sport="冰球"] .fill{background:linear-gradient(90deg,#03A9F4,#4FC3F7)}
.cat-bar[data-sport="奥运"] .fill{background:linear-gradient(90deg,var(--gold),#FFEE58)}
.cat-bar[data-sport="综合"] .fill{background:linear-gradient(90deg,#9C27B0,#CE93D8)}

canvas#radarC{max-width:100%;margin:0 auto;display:block}

/* leaderboard */
.lb-table{width:100%;border-collapse:collapse}
.lb-table th{font-size:11px;color:var(--t3);letter-spacing:.15em;text-transform:uppercase;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.lb-table td{padding:12px;font-size:14px;color:var(--t2);border-bottom:1px solid rgba(255,255,255,.04)}
.lb-table tr.me td{color:var(--green);font-weight:700}
.lb-table .rank-cell{font-weight:800;color:var(--gold);font-size:16px;width:40px}
.lb-table .score-cell{font-variant-numeric:tabular-nums;font-weight:600}
.lb-table .bar-cell{width:40%}
.lb-table .bar-cell .mini-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.lb-table .bar-cell .mini-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:3px}
.lb-empty{text-align:center;padding:24px;color:var(--t3);font-size:13px}

.analysis-text{font-size:14px;color:var(--t2);line-height:2;margin-top:16px;padding:16px;background:rgba(255,255,255,.03);border-radius:12px}

.actions{display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap}
.actions button{padding:12px 28px;background:var(--card);border:1px solid var(--border);color:var(--t2);border-radius:50px;cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:.1em;transition:all .2s}
.actions button:hover{border-color:var(--green);color:var(--green)}

@media(max-width:640px){
  .wrap{padding:20px 14px 60px}
  .intro h1{font-size:32px}
  .qcard{padding:28px 20px;border-radius:16px}
  .qtext{font-size:18px}
  .hud{margin:-20px -14px 20px}
  .big-score .num{font-size:56px}
}
</style>
</head>
<body>
<div class="wrap">

<!-- ===== INTRO ===== -->
<div class="screen active" id="s-intro">
  <div class="intro">
    <div class="logo">🏟️</div>
    <h1>体育百科竞答<small>Sports Trivia Arena</small></h1>
    <p class="desc">涵盖足球、篮球、网球、橄榄球、棒球、冰球及奥运会项目，从经典历史到奇闻逸事，100 道题全方位检验你的体育知识储备。你的成绩将被记入排行榜，与所有挑战者一较高下。</p>
    <div class="sports-icons">
      <span class="sport-tag">⚽ 足球</span><span class="sport-tag">🏀 篮球</span>
      <span class="sport-tag">🎾 网球</span><span class="sport-tag">🏈 橄榄球</span>
      <span class="sport-tag">⚾ 棒球</span><span class="sport-tag">🏒 冰球</span>
      <span class="sport-tag">🏅 奥运</span><span class="sport-tag">🌐 综合</span>
    </div>
    <div class="id-box">
      <label>输入你的玩家 ID</label>
      <input type="text" id="pid" placeholder="例：SportsKing_99" maxlength="20" autocomplete="off">
    </div>
    <div class="settings">
      <button class="sopt sel" data-n="30" onclick="setN(this)">30 题 · 快速</button>
      <button class="sopt" data-n="50" onclick="setN(this)">50 题 · 标准</button>
      <button class="sopt" data-n="100" onclick="setN(this)">100 题 · 全马</button>
    </div>
    <button class="btn" id="startBtn" onclick="startGame()" disabled>开 始 竞 答</button>
  </div>
</div>

<!-- ===== QUIZ ===== -->
<div class="screen" id="s-quiz">
  <div class="hud"><div class="hud-inner">
    <span class="qno" id="qno">01/30</span>
    <div class="track"><div class="fill" id="fill"></div></div>
    <span class="timer" id="timer">20</span>
    <span class="score-disp" id="sd">🏆 0</span>
  </div></div>
  <div class="qcard" id="qcard"></div>
  <div class="qnav"><button id="nextBtn" onclick="nextQ()">下一题 →</button></div>
</div>

<!-- ===== RESULT ===== -->
<div class="screen" id="s-result">
  <div class="rh">
    <div class="badge">Game Over</div>
    <h2 id="finalTitle">竞答结束</h2>
    <div class="sub" id="finalSub"></div>
  </div>

  <div class="sec">
    <div class="sec-head"><span class="sec-icon">🏆</span><span class="sec-title">最终成绩</span><span class="sec-sub">Final Score</span></div>
    <div class="big-score">
      <div class="num" id="finalScore">0</div>
      <div class="of" id="finalOf"></div>
      <div class="rank-text" id="rankText"></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-head"><span class="sec-icon">📊</span><span class="sec-title">运动分项成绩</span><span class="sec-sub">Category Breakdown</span></div>
    <div class="cat-bars" id="catBars"></div>
    <div style="display:flex;justify-content:center;margin-top:24px"><canvas id="radarC" width="420" height="420"></canvas></div>
  </div>

  <div class="sec">
    <div class="sec-head"><span class="sec-icon">🔍</span><span class="sec-title">知识画像分析</span><span class="sec-sub">Analysis</span></div>
    <div class="analysis-text" id="analysis"></div>
  </div>

  <div class="sec">
    <div class="sec-head"><span class="sec-icon">🏅</span><span class="sec-title">排行榜</span><span class="sec-sub">Leaderboard</span></div>
    <div id="lbWrap"></div>
  </div>

  <div class="actions">
    <button onclick="location.reload()">重新挑战</button>
    <button onclick="shareResult()">复制成绩</button>
    <button onclick="clearLB()">清除排行榜</button>
  </div>
</div>

</div>

<script>
// ============ 题库（100题） ============
const CATS=['足球','篮球','网球','橄榄球','棒球','冰球','奥运','综合'];
const DB=[
// ====== 足球 (18) ======
{c:'足球',t:'FIFA 世界杯历史上，哪个国家夺冠次数最多？',o:['巴西','德国','意大利','阿根廷'],a:0,x:'巴西队共获得 5 次世界杯冠军（1958/1962/1970/1994/2002），是夺冠次数最多的国家。'},
{c:'足球',t:'足球比赛中，一名球员在一场比赛中进 3 球被称为？',o:['大四喜','帽子戏法','梅开二度','独中五元'],a:1,x:'帽子戏法（Hat-trick）源自板球运动，指一场比赛中完成三个进球。'},
{c:'足球',t:'2022 年卡塔尔世界杯决赛中，阿根廷队的对手是？',o:['克罗地亚','法国','巴西','摩洛哥'],a:1,x:'阿根廷在 2022 年世界杯决赛中通过点球大战击败法国队夺冠。'},
{c:'足球',t:'哪位球员被称为"外星人"（O Fenômeno）？',o:['罗纳尔迪尼奥','罗纳尔多','里瓦尔多','卡卡'],a:1,x:'巴西前锋罗纳尔多因超凡的技术和速度被称为"外星人"。'},
{c:'足球',t:'英超联赛历史上进球最多的球员是？',o:['韦恩·鲁尼','阿兰·希勒','蒂埃里·亨利','安迪·科尔'],a:1,x:'阿兰·希勒以 260 个英超进球保持着联赛历史最佳射手纪录。'},
{c:'足球',t:'标准足球场上，每队同时上场的球员数量是？',o:['10人','11人','12人','9人'],a:1,x:'每队 11 名球员同时在场上，包括一名守门员。'},
{c:'足球',t:'越位规则中，进攻球员必须确保身前至少有几名防守球员（含门将）？',o:['1名','2名','3名','无要求'],a:1,x:'进攻球员在接球瞬间，身前至少需要有 2 名防守球员（通常是门将+一名后卫）。'},
{c:'足球',t:'西班牙足球甲级联赛中，哪两支球队的对决被称为"国家德比"？',o:['皇马 vs 马竞','巴萨 vs 马竞','皇马 vs 巴萨','塞维利亚 vs 皇家贝蒂斯'],a:2,x:'皇家马德里与巴塞罗那之间的比赛被称为"El Clásico"（国家德比）。'},
{c:'足球',t:'世界杯历史上，单届赛事个人进球纪录保持者是？',o:['贝利','盖德·穆勒','朱斯特·方丹','克洛泽'],a:2,x:'法国球员方丹在 1958 年世界杯中打入 13 球，至今无人打破。'},
{c:'足球',t:'红牌在足球中意味着什么？',o:['警告','直接罚下','暂时离场10分钟','取消下场比赛资格'],a:1,x:'红牌意味着球员被直接罚下场，且该队不能补充替换球员。'},
{c:'足球',t:'哪位守门员以"蝎子摆尾"扑救闻名？',o:['布冯','雷内·伊基塔','诺伊尔','舒梅切尔'],a:1,x:'哥伦比亚门将伊基塔在 1995 年用脚后跟完成了经典的"蝎子摆尾"扑救。'},
{c:'足球',t:'UEFA 欧洲冠军联赛夺冠次数最多的俱乐部是？',o:['AC米兰','利物浦','皇家马德里','拜仁慕尼黑'],a:2,x:'皇家马德里以 15 次欧冠冠军遥遥领先于其他所有俱乐部。'},
{c:'足球',t:'足球场上的点球点距球门线多远？',o:['9.15米','11米','12码(约10.97米)','10米'],a:2,x:'点球点距球门线 12 码（约 10.97 米），这也是"12码"说法的由来。'},
{c:'足球',t:'世界杯历史上累计进球最多的球员是？',o:['罗纳尔多','贝利','米洛斯拉夫·克洛泽','盖德·穆勒'],a:2,x:'德国球员克洛泽以 16 个世界杯进球成为世界杯历史最佳射手。'},
{c:'足球',t:'足球运动起源于哪个国家？',o:['巴西','意大利','英格兰','中国（蹴鞠）'],a:2,x:'现代足球起源于 19 世纪的英格兰，但 FIFA 承认中国古代的蹴鞠为足球的最早形式。此题指现代足球规则的诞生地。'},
{c:'足球',t:'梅西在 2012 年自然年中打进了多少个进球？',o:['73','86','91','79'],a:2,x:'梅西在 2012 年打入 91 粒进球，打破了盖德·穆勒保持的自然年 85 球纪录。'},
{c:'足球',t:'"手球之神"事件发生在哪届世界杯？',o:['1982年','1986年','1990年','1994年'],a:1,x:'1986 年世界杯四分之一决赛，马拉多纳用手将球打入英格兰球门，被称为"上帝之手"。'},

// ============ 状态 ============
const LS_KEY='sports_trivia_lb';
let pid='',qCount=30,curQ=[],qi=0,score=0,catScore={},catTotal={},answered=false,timerID=null,timeLeft=20;

document.getElementById('pid').addEventListener('input',e=>{
  pid=e.target.value.trim();
  document.getElementById('startBtn').disabled=!pid;
});

function setN(el){
  document.querySelectorAll('.sopt').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  qCount=parseInt(el.dataset.n);
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.random()*i+1|0;[a[i],a[j]]=[a[j],a[i]]}return a;
}

function startGame(){
  if(!pid)return;
  // Pick qCount questions distributed proportionally across categories
  const pool=shuffle(DB);
  curQ=pool.slice(0,Math.min(qCount,pool.length));
  qi=0;score=0;
  CATS.forEach(c=>{catScore[c]=0;catTotal[c]=0});
  curQ.forEach(q=>catTotal[q.c]=(catTotal[q.c]||0)+1);
  showScreen('s-quiz');renderQ();
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}

function renderQ(){
  answered=false;
  const q=curQ[qi];
  document.getElementById('qno').textContent=`${String(qi+1).padStart(2,'0')}/${curQ.length}`;
  document.getElementById('fill').style.width=Math.round(qi/curQ.length*100)+'%';
  document.getElementById('sd').textContent=`🏆 ${score}`;
  document.getElementById('nextBtn').classList.remove('show');

  const keys='ABCD';
  let html=`<div class="qcat">${q.c}</div><div class="qtext">${q.t}</div><div class="opts">`;
  q.o.forEach((o,i)=>{
    html+=`<button class="opt" onclick="answer(${i})"><span class="key">${keys[i]}</span><span>${o}</span></button>`;
  });
  html+=`</div><div class="explain" id="expl">${q.x||''}</div>`;
  document.getElementById('qcard').innerHTML=html;

  // Timer
  timeLeft=20;
  document.getElementById('timer').textContent='20';
  document.getElementById('timer').classList.remove('warn');
  clearInterval(timerID);
  timerID=setInterval(()=>{
    timeLeft--;
    document.getElementById('timer').textContent=timeLeft;
    if(timeLeft<=5)document.getElementById('timer').classList.add('warn');
    if(timeLeft<=0){clearInterval(timerID);autoFail()}
  },1000);
}

function autoFail(){
  if(answered)return;
  answered=true;
  const q=curQ[qi];
  const opts=document.querySelectorAll('.opt');
  opts.forEach((o,i)=>{
    o.classList.add('locked');
    if(i===q.a)o.classList.add('correct');
  });
  document.getElementById('expl').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('nextBtn').textContent=qi===curQ.length-1?'查看成绩 →':'下一题 →';
}

function answer(i){
  if(answered)return;
  answered=true;
  clearInterval(timerID);
  const q=curQ[qi];
  const opts=document.querySelectorAll('.opt');
  opts.forEach((o,k)=>{
    o.classList.add('locked');
    if(k===q.a)o.classList.add('correct');
  });
  if(i===q.a){
    score++;
    catScore[q.c]=(catScore[q.c]||0)+1;
  }else{
    opts[i].classList.add('wrong');
  }
  document.getElementById('sd').textContent=`🏆 ${score}`;
  document.getElementById('expl').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('nextBtn').textContent=qi===curQ.length-1?'查看成绩 →':'下一题 →';
}

function nextQ(){
  if(qi<curQ.length-1){qi++;renderQ();}
  else{finishGame();}
}

function finishGame(){
  clearInterval(timerID);
  // Save to leaderboard
  const lb=JSON.parse(localStorage.getItem(LS_KEY)||'[]');
  const entry={id:pid,score,total:curQ.length,pct:Math.round(score/curQ.length*100),cats:{...catScore},catTotals:{...catTotal},ts:Date.now()};
  lb.push(entry);
  localStorage.setItem(LS_KEY,JSON.stringify(lb));

  showScreen('s-result');
  renderResult(entry,lb);
}

function renderResult(entry,lb){
  document.getElementById('finalScore').textContent=entry.pct+'%';
  document.getElementById('finalOf').textContent=`${score} / ${curQ.length} 正确`;
  document.getElementById('finalSub').textContent=`玩家 ${pid} · ${curQ.length}题模式`;

  // Rank
  const sorted=[...lb].sort((a,b)=>b.pct-a.pct);
  const rank=sorted.findIndex(x=>x.ts===entry.ts)+1;
  const rankSuf=['','🥇','🥈','🥉'];
  document.getElementById('rankText').textContent=`排行榜第 ${rank} 名 / 共 ${sorted.length} 人 ${rankSuf[rank]||''}`;

  // Title based on score
  const p=entry.pct;
  if(p>=90) document.getElementById('finalTitle').textContent='体育百科全书 🏆';
  else if(p>=75) document.getElementById('finalTitle').textContent='体育达人 ⭐';
  else if(p>=60) document.getElementById('finalTitle').textContent='运动爱好者 💪';
  else if(p>=40) document.getElementById('finalTitle').textContent='偶尔看看比赛 📺';
  else document.getElementById('finalTitle').textContent='体育小白 🌱';

  // Category bars
  const cats=CATS.filter(c=>catTotal[c]>0);
  const barsHtml=cats.map(c=>{
    const s=catScore[c]||0,t=catTotal[c]||1;
    const pct=Math.round(s/t*100);
    return `<div class="cat-bar" data-sport="${c}"><span class="label">${c}</span><div class="track"><div class="fill" style="width:${pct}%"></div></div><span class="val">${s}/${t} (${pct}%)</span></div>`;
  }).join('');
  document.getElementById('catBars').innerHTML=barsHtml;

  // Radar chart
  drawRadar(cats);

  // Analysis
  const best=cats.reduce((a,b)=>(catScore[a]||0)/(catTotal[a]||1)>(catScore[b]||0)/(catTotal[b]||1)?a:b);
  const worst=cats.reduce((a,b)=>(catScore[a]||0)/(catTotal[a]||1)<(catScore[b]||0)/(catTotal[b]||1)?a:b);
  const bestPct=Math.round((catScore[best]||0)/(catTotal[best]||1)*100);
  const worstPct=Math.round((catScore[worst]||0)/(catTotal[worst]||1)*100);
  let analysis=`<b>${pid}</b>，你的体育知识总体得分 <b>${entry.pct}%</b>。`;
  analysis+=`<br><br>📈 <b>最强项目：${best}</b>（正确率 ${bestPct}%）—— `;
  if(best==='足球') analysis+='你对世界第一运动的了解令人印象深刻，从世界杯历史到战术细节都信手拈来。';
  else if(best==='篮球') analysis+='你是篮球通！NBA 的历史数据和传奇球星在你脑中如数家珍。';
  else if(best==='网球') analysis+='网球是你的领域，大满贯的一切秘密你都了如指掌。';
  else if(best==='橄榄球') analysis+='超级碗和达阵——你对橄榄球的理解远超常人。';
  else if(best==='棒球') analysis+='从本垒打到世界大赛，你是真正的棒球行家。';
  else if(best==='冰球') analysis+='冰上项目是你的舒适区，格雷茨基会为你骄傲。';
  else if(best==='奥运') analysis+='你是奥运百科全书，从古希腊到巴黎奥运无所不知。';
  else analysis+='你的体育知识面非常广泛。';

  analysis+=`<br><br>📉 <b>提升空间：${worst}</b>（正确率 ${worstPct}%）—— 这个领域还有很大的探索空间！建议多看一些${worst}比赛和纪录片，你会发现全新的精彩世界。`;

  // Overall flavor
  if(p>=90) analysis+='<br><br>🏆 总评：你是真正的体育百科全书，几乎没有能难住你的题目！';
  else if(p>=75) analysis+='<br><br>⭐ 总评：你对体育的热爱和了解都让人佩服，继续保持！';
  else if(p>=50) analysis+='<br><br>💪 总评：你有不错的体育基础，多看几场比赛就能更上一层楼。';
  else analysis+='<br><br>📺 总评：体育世界精彩纷呈，试着关注一两项你感兴趣的运动吧！';

  document.getElementById('analysis').innerHTML=analysis;

  // Leaderboard
  renderLB(sorted,entry.ts);
}

function drawRadar(cats){
  const c=document.getElementById('radarC');if(!c)return;
  const ctx=c.getContext('2d');const W=c.width,H=c.height;
  const cx=W/2,cy=H/2,R=140,n=cats.length;
  if(n<3)return;
  ctx.clearRect(0,0,W,H);

  // Grid
  for(let g=1;g<=5;g++){
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const a=Math.PI*2*i/n-Math.PI/2;
      const x=cx+Math.cos(a)*R*g/5,y=cy+Math.sin(a)*R*g/5;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;ctx.stroke();
  }

  // Axes & Labels
  const catColors={'足球':'#4CAF50','篮球':'#FF9800','网球':'#CDDC39','橄榄球':'#795548','棒球':'#F44336','冰球':'#03A9F4','奥运':'#FFD740','综合':'#CE93D8'};
  ctx.font='600 12px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);
    ctx.strokeStyle='rgba(255,255,255,.06)';ctx.stroke();
    const lx=cx+Math.cos(a)*(R+24),ly=cy+Math.sin(a)*(R+24);
    ctx.fillStyle=catColors[cats[i]]||'#fff';
    ctx.fillText(cats[i],lx,ly);
  }

  // Data polygon
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n-Math.PI/2;
    const v=(catScore[cats[i]]||0)/(catTotal[cats[i]]||1);
    const x=cx+Math.cos(a)*R*v,y=cy+Math.sin(a)*R*v;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(0,230,118,.18)';ctx.fill();
  ctx.strokeStyle='#00E676';ctx.lineWidth=2.5;ctx.stroke();

  // Dots
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n-Math.PI/2;
    const v=(catScore[cats[i]]||0)/(catTotal[cats[i]]||1);
    const x=cx+Math.cos(a)*R*v,y=cy+Math.sin(a)*R*v;
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle='#00E676';ctx.fill();
    ctx.strokeStyle='#0A1628';ctx.lineWidth=2;ctx.stroke();
  }
}

function renderLB(sorted,myTs){
  if(sorted.length===0){document.getElementById('lbWrap').innerHTML='<div class="lb-empty">暂无记录</div>';return}
  let html='<table class="lb-table"><thead><tr><th>#</th><th>玩家</th><th>得分</th><th>正确率</th><th></th></tr></thead><tbody>';
  sorted.slice(0,20).forEach((e,i)=>{
    const me=e.ts===myTs?' me':'';
    html+=`<tr class="${me}"><td class="rank-cell">${i+1}</td><td>${e.id}</td><td class="score-cell">${e.score}/${e.total}</td><td class="score-cell">${e.pct}%</td><td class="bar-cell"><div class="mini-bar"><div class="mini-fill" style="width:${e.pct}%"></div></div></td></tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('lbWrap').innerHTML=html;
}

function shareResult(){
  const cats=CATS.filter(c=>catTotal[c]>0);
  const catStr=cats.map(c=>`  ${c}: ${Math.round((catScore[c]||0)/(catTotal[c]||1)*100)}%`).join('\n');
  const text=`🏟️ 体育百科竞答结果\n\n玩家: ${pid}\n总分: ${score}/${curQ.length} (${Math.round(score/curQ.length*100)}%)\n\n分项成绩:\n${catStr}\n\n来挑战 → ${location.href}`;
  navigator.clipboard.writeText(text).then(()=>alert('✦ 成绩已复制到剪贴板！'));
}

function clearLB(){
  if(confirm('确定清除排行榜所有记录吗？')){
    localStorage.removeItem(LS_KEY);
    document.getElementById('lbWrap').innerHTML='<div class="lb-empty">排行榜已清空</div>';
  }
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(document.getElementById('s-quiz').classList.contains('active')){
    const map={a:0,b:1,c:2,d:3,'1':0,'2':1,'3':2,'4':3};
    if(e.key.toLowerCase() in map && !answered) answer(map[e.key.toLowerCase()]);
    if((e.key==='Enter'||e.key===' ')&&answered) nextQ();
  }
});
